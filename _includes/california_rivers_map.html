  [-124.05,41.40],[-124.20,41.70],[-124.21,41.99]

var rivers = [
  {

    coords: [

  },
  {

    coords: [

    ]
  },

    coords: [
      [37.62,-119.07],[37.35,-119.40],[36.98,-119.55],[36.85,-119.80],
      [36.95,-120.20],[37.20,-120.60],[37.50,-120.90],[37.75,-121.00],

    ]

  {

      [42.05,-121.78],[41.98,-122.20],[41.85,-122.70],[41.80,-123.00],

  },

      [41.05,-122.75],[40.90,-122.78],[40.80,-123.00],

    coords: [
      [39.38,-123.03],[39.10,-123.10],[38.85,-123.00],

    ]
  },
  {

    coords: [
      [37.74,-119.57],[37.65,-119.75],[37.53,-120.00],

  {

    ]

// Map
var map = L.map('ca-rivers-map').setView([37.5,-119.5], 6);

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  maxZoom: 17,
  attribution: '© <a href="https://opentopomap.org">OpenTopoMap</a>'
}).addTo(map);

// Inverted California mask — dims surrounding states
L.geoJSON({
  type: 'Feature',
  geometry: {
    type: 'Polygon',
    coordinates: [
      [[-180,-90],[-180,90],[180,90],[180,-90],[-180,-90]], // world exterior (CCW)
      CAL // California hole (CW)
    ]
  }
}, {
  style: { fillColor: '#f0ebe0', fillOpacity: 0.68, color: '#b8860b', weight: 1.5, fillRule: 'evenodd' }
}).addTo(map);

// Helpers
function fmtDate(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function fetchStorage(station, capacity, cb) {
  var end = new Date(), start = new Date(+end - 10*86400000);
  var url = 'https://cdec.water.ca.gov/dynamicapp/req/JSONDataServicesDesk?Stations='+station+'&SensorNums=15&dur_code=D&Start_time='+fmtDate(start)+'&End_time='+fmtDate(end);
  fetch('https://corsproxy.io/?'+encodeURIComponent(url))
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!Array.isArray(data)) { cb(null); return; }
      var latest = null;
      for (var i = data.length-1; i >= 0; i--) {
        var v = parseFloat(data[i].value);
        if (!isNaN(v) && v > 0) { latest = v; break; }
      }
      if (latest === null) { cb(null); return; }
      cb({ af: latest, pct: Math.min(100, latest/capacity*100).toFixed(1) });
    })
    .catch(function(){ cb(null); });
}

function popupHTML(river, data) {
  var h = '<div style="min-width:160px;font-family:inherit;color:#1a3a1a;">'
        + '<strong style="display:block;margin-bottom:6px;font-size:0.95rem;">'+river.name+'</strong>';
  if (river.station && data === undefined) {
    h += '<div style="font-size:0.82rem;color:#555;">'+river.reservoir+': <em>fetching…</em></div>';
  } else if (river.station && data) {
    var pct = parseFloat(data.pct);
    var col = pct > 60 ? '#27ae60' : pct > 30 ? '#f39c12' : '#c0392b';
    h += '<div style="font-size:0.82rem;color:#555;margin-bottom:4px;">'+river.reservoir+'</div>';
    h += '<div style="background:#ddd;border-radius:4px;height:8px;width:100%;margin:4px 0;">'
       + '<div style="width:'+pct+'%;background:'+col+';height:8px;border-radius:4px;"></div></div>';
    h += '<div style="font-size:0.82rem;color:#555;"><strong>'+data.pct+'%</strong> capacity &nbsp;·&nbsp; '+Math.round(data.af/1000)+'K AF</div>';
  } else if (river.station && data === null) {
    h += '<div style="font-size:0.82rem;color:#555;">'+river.reservoir+': data unavailable</div>';
  } else {
    h += '<div style="font-size:0.82rem;color:#555;">No major reservoir</div>';
  }
  return h + '</div>';
}

// River layers
var activeBtn = null;
var rLayers = {};

rivers.forEach(function(river) {
  var line = L.polyline(river.coords, { color: river.color, weight: 3, opacity: 0.85 }).addTo(map);
  line.bindPopup('');

  function openWithData(latlng) {
    line.setPopupContent(popupHTML(river, undefined));
    line.openPopup(latlng || line.getBounds().getCenter());
    if (river.station) {
      fetchStorage(river.station, river.capacity, function(data) {
        line.setPopupContent(popupHTML(river, data));
      });
    } else {
      line.setPopupContent(popupHTML(river, null));
    }
  }

  line.on('click', function(e) {
    resetLines();
    line.setStyle({ weight: 6, opacity: 1 });
    syncBtn(river.name);
    openWithData(e.latlng);
  });

  rLayers[river.name] = { line: line, openWithData: openWithData };
});

function resetLines() {
  rivers.forEach(function(r) {
    if (rLayers[r.name]) rLayers[r.name].line.setStyle({ weight: 3, opacity: 0.85 });
  });
}

function syncBtn(name) {
  if (activeBtn) activeBtn.classList.remove('active');
  var btn = document.querySelector('[data-river="'+name+'"]');
  if (btn) { btn.classList.add('active'); activeBtn = btn; }
}

// Buttons
var listEl = document.getElementById('river-list');
rivers.forEach(function(river) {
  var btn = document.createElement('button');
  btn.className = 'river-btn';
  btn.textContent = river.name;
  btn.dataset.river = river.name;
  btn.style.borderColor = river.color;
  btn.style.color = river.color;

  btn.addEventListener('click', function() {
    resetLines();
    if (activeBtn === btn) {
      activeBtn.classList.remove('active');
      activeBtn = null;
      return;
    }
    syncBtn(river.name);
    var l = rLayers[river.name];
    l.line.setStyle({ weight: 6, opacity: 1 });
    map.fitBounds(l.line.getBounds(), { padding: [60, 60] });
    l.openWithData();
  });

  listEl.appendChild(btn);
});

})();
});
</script>
